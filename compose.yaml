services:
  llmfit-api:
    build:
      context: .
    command: ["serve", "--host", "0.0.0.0", "--port", "8787"]
    ports:
      - "8787:8787"
    restart: unless-stopped

  llmfit-site:
    image: nginx:1.27-alpine
    depends_on:
      - llmfit-api
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./deploy/site.nginx.conf:/etc/nginx/conf.d/default.conf:ro
