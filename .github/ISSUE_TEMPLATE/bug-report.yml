name: Bug report
description: Report a defect in the CLI, TUI, API, desktop app, or site.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, hardware details, model name, and runtime if relevant.
      placeholder: |
        1. Run `llmfit ...`
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, CPU, GPU, RAM, and llmfit version.
    validations:
      required: true
